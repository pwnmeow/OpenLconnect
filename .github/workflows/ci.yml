name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build (linux/amd64 + arm64)
        run: |
          GOOS=linux GOARCH=amd64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./cmd/lianctl
